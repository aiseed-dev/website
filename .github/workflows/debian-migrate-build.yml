name: debian-migrate / build

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync deps
        working-directory: apps/debian-migrate
        run: uv sync

      - name: Build (${{ matrix.target }})
        working-directory: apps/debian-migrate
        run: uv run flet build ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-migrate-${{ matrix.target }}
          path: apps/debian-migrate/build/${{ matrix.target }}/
          if-no-files-found: error
