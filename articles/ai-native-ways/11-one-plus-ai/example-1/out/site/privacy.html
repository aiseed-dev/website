<h1>プライバシー</h1>
<p>Mochi.ai が扱うデータ:</p>
<ul>
<li>センサが計測した温度・湿度・人感</li>
<li>LINE で送られた質問内容</li>
</ul>
<p>これらは:</p>
<ul>
<li>暗号化して保存(AES-256)</li>
<li>日本国内のサーバ(Cloudflare R2 + Tokyo)</li>
<li>解約時に 30 日以内に削除</li>
<li>第三者提供しない(法執行の要請を除く)</li>
</ul>
<h2>AI への送信</h2>
<p>異常検知の判定や月次サマリ生成のために、Claude (Anthropic) に
<strong>集計値だけ</strong> を送ります。住所・氏名・LINE ID は送りません。</p>
