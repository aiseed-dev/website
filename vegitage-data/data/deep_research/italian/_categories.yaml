# イタリア野菜図鑑 カテゴリ分類
# build.py はこのファイルを読んで一覧ページを植物学的カテゴリでグループ化する。
# crops に載せた順序ではなく、作物の短縮名（short_name）でカード内は並び替えられる。
# ここに列挙されていない作物は「その他」セクションに自動で集められる。

categories:
  - key: leaf
    label: 葉菜類
    description: 葉や若い茎を食べる野菜。サラダや炒め物、煮込みに欠かせない。
    crops:
      - アグレッティ
      - エンダイブ
      - カーボロネロ、ケール
      - カブとチーマ・ディ・ラーパ
      - クレソン
      - ストリドーロ
      - タンポポ
      - チコリー
      - チコリー緑及び白
      - チコリー（プンタレッレ）
      - チコリー（ラディッキオ）
      - フダンソウ
      - ホウレンソウ
      - ボリジ
      - ルッコラ
      - レタス
      - 結球キャベツ

  - key: fruit-vegetable
    label: 果菜類
    description: 果実を食べる野菜。夏の食卓の主役。
    crops:
      - カボチャ
      - キュウリ
      - ズッキーニ
      - トマト
      - ナス
      - ピーマン
      - ペペロンチーノ

  - key: root
    label: 根菜類
    description: 根や肥大した主根を食べる野菜。
    crops:
      - サルシフィ
      - パースニップ
      - ビーツ
      - ラディッシュ
      - 人参

  - key: stem
    label: 茎菜類
    description: 茎や葉柄、肥大した茎基部を食べる野菜。
    crops:
      - アスパラガス
      - カルドン
      - コールラビ
      - セルリアック
      - セロリ
      - フェンネル

  - key: flower
    label: 花菜類
    description: 花蕾や花序を食べる野菜。
    crops:
      - アーティチョーク
      - カリフラワー
      - ブロッコリー

  - key: bulb
    label: 鱗茎類
    description: 鱗茎（球根）を食べる野菜。
    crops:
      - ニンニク
      - ポロとチポッロット

  - key: legume
    label: 豆類
    description: 豆やさやを食べる豆科の野菜。地中海食の重要な蛋白源。
    crops:
      - インゲン
      - エンドウマメ
      - サヤインゲン
      - ソラマメ
      - ヒヨコマメ
      - ルピニ豆
      - レンズ豆

  - key: grain
    label: 穀物
    description: パン・パスタ・リゾットなどの主食を支える穀物。
    crops:
      - そば
      - カッペリ
      - トウモロコシ
      - 大麦
      - 小麦
      - 米

  - key: fruit
    label: 果物・ナッツ
    description: 果樹・ナッツ類。デザートはもちろん料理にも使われる。
    crops:
      - イチジク
      - オリーブ
      - オレンジ
      - ブドウ
      - ヘーゼルナッツ
      - メロン
      - レモン
      - 栗
      - 西洋梨

  - key: herb
    label: ハーブ・香草
    description: 料理に香りと風味を添える芳香植物。
    crops:
      - イタリアンパセリ
      - エルダーフラワー
      - オレガノ・マジョラム
      - セージ
      - バジル
      - ローズマリー
      - 月桂樹
